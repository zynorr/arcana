    region: oregon
    rootDir: packages/api
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        value: postgresql://arcana_usc4_user:Ec5kKa95q0Y64LYjf1Gpy5VG4syCk7Kt@dpg-d7rl9nbeo5us73deps1g-a.oregon-postgres.render.com/arcana_usc4
      - key: REDIS_URL
        value: redis://red-d7rleg3t6lks73c1m83g:6379
      - key: ARBITRUM_RPC_URL
